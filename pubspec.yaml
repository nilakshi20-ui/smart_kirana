name: smart_kirana
description: Smart Kirana Management System - Retail Store Automation

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase (Auth + Database + Storage)
  supabase_flutter: ^2.3.4

  # Offline SQLite
  sqflite: ^2.3.2
  path: ^1.9.0

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.0

  # Forms & Validation
  reactive_forms: ^17.0.1

  # Charts & Analytics
  fl_chart: ^0.68.0

  # PDF & Sharing
  pdf: ^3.10.8
  printing: ^5.12.0
  share_plus: ^9.0.0
  path_provider: ^2.1.3

  # Notifications
  flutter_local_notifications: ^17.2.1
  timezone: ^0.9.4

  # Network
  connectivity_plus: ^6.0.3
  http: ^1.2.1

  # Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # Utilities
  intl: ^0.20.2
  uuid: ^4.4.0
  collection: ^1.18.0
  equatable: ^2.0.5

  # Barcode Scanner (optional)
  mobile_scanner: ^5.1.1

  # Icons
  iconsax: ^0.0.8
  image_picker: ^1.2.0
  image_cropper: 7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true

